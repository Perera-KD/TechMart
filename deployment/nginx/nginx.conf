events { worker_connections 1024; }

http {
    upstream techmart-servers {
        # Round-robin configuration balancing between Payara clustered nodes
        server payara-node1:8080 weight=1 max_fails=3 fail_timeout=30s;
        server payara-node2:8080 weight=1 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://techmart-servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Enable sticky sessions/failover support parameters if desired
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_redirect off;
        }
    }
}
